<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sistema de Seguimiento - Despacho de Aduana</title>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;700&family=JetBrains+Mono:wght@400;600&display=swap" rel="stylesheet">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/3.9.1/chart.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-database-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-auth-compat.js"></script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        :root {
            --primary: #0a4d68; --primary-light: #088395; --accent: #05bfdb;
            --success: #00c48c; --warning: #ffa41b; --danger: #ff6b6b;
            --bg-dark: #0d1b2a; --bg-card: #1b263b; --bg-light: #415a77;
            --text: #e0e1dd; --text-muted: #778da9; --border: #2d3e50;
        }
        body { font-family: 'Outfit', sans-serif; background: linear-gradient(135deg, var(--bg-dark) 0%, #162a40 100%); color: var(--text); min-height: 100vh; padding: 20px; }
        .container { max-width: 1400px; margin: 0 auto; }
        header { background: rgba(27, 38, 59, 0.6); backdrop-filter: blur(10px); border: 1px solid var(--border); padding: 25px 30px; border-radius: 16px; margin-bottom: 30px; box-shadow: 0 8px 32px rgba(0,0,0,0.3); }
        h1 { font-size: 2rem; font-weight: 700; background: linear-gradient(135deg, var(--accent), var(--primary-light)); -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text; margin-bottom: 8px; }
        .subtitle { color: var(--text-muted); font-size: 0.95rem; font-weight: 300; }
        .stats-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); gap: 20px; margin-bottom: 30px; }
        .stat-card { background: rgba(27, 38, 59, 0.5); border: 1px solid var(--border); padding: 20px; border-radius: 12px; backdrop-filter: blur(10px); transition: all 0.3s ease; }
        .stat-card:hover { transform: translateY(-4px); border-color: var(--accent); box-shadow: 0 8px 24px rgba(5, 191, 219, 0.2); }
        .stat-value { font-size: 2.5rem; font-weight: 700; font-family: 'JetBrains Mono', monospace; margin-bottom: 5px; }
        .stat-label { color: var(--text-muted); font-size: 0.85rem; text-transform: uppercase; letter-spacing: 1px; }
        .toolbar { background: rgba(27, 38, 59, 0.5); border: 1px solid var(--border); padding: 20px; border-radius: 12px; margin-bottom: 25px; display: flex; flex-wrap: wrap; gap: 15px; align-items: center; }
        .btn { padding: 12px 24px; border: none; border-radius: 8px; font-weight: 600; cursor: pointer; transition: all 0.3s ease; font-family: 'Outfit', sans-serif; font-size: 0.9rem; display: inline-flex; align-items: center; gap: 8px; }
        .btn-primary { background: linear-gradient(135deg, var(--primary-light), var(--accent)); color: white; box-shadow: 0 4px 12px rgba(5, 191, 219, 0.3); }
        .btn-primary:hover { transform: translateY(-2px); box-shadow: 0 6px 20px rgba(5, 191, 219, 0.4); }
        .btn-secondary { background: var(--bg-light); color: var(--text); border: 1px solid var(--border); }
        .btn-secondary:hover { background: var(--bg-card); border-color: var(--accent); }
        input, select { padding: 12px 16px; border: 1px solid var(--border); border-radius: 8px; background: var(--bg-card); color: var(--text); font-family: 'Outfit', sans-serif; font-size: 0.9rem; flex: 1; min-width: 200px; }
        input:focus, select:focus { outline: none; border-color: var(--accent); box-shadow: 0 0 0 3px rgba(5, 191, 219, 0.1); }
        .operations-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(380px, 1fr)); gap: 20px; }
        .operation-card { background: rgba(27, 38, 59, 0.6); border: 1px solid var(--border); border-radius: 12px; padding: 20px; backdrop-filter: blur(10px); transition: all 0.3s ease; position: relative; overflow: hidden; }
        .operation-card::before { content: ''; position: absolute; top: 0; left: 0; right: 0; height: 4px; background: var(--accent); }
        .operation-card.completado::before { background: var(--success); }
        .operation-card.pendiente::before { background: var(--warning); }
        .operation-card.detenido::before { background: var(--danger); }
        .operation-card:hover { transform: translateY(-4px); box-shadow: 0 12px 32px rgba(0,0,0,0.4); border-color: var(--accent); }
        .operation-header { display: flex; justify-content: space-between; align-items: start; margin-bottom: 15px; }
        .operation-number { font-family: 'JetBrains Mono', monospace; font-size: 1.1rem; font-weight: 700; color: var(--accent); }
        .operation-status { padding: 6px 14px; border-radius: 20px; font-size: 0.75rem; font-weight: 600; text-transform: uppercase; letter-spacing: 0.5px; }
        .status-completado { background: rgba(0, 196, 140, 0.2); color: var(--success); }
        .status-pendiente { background: rgba(255, 164, 27, 0.2); color: var(--warning); }
        .status-en-curso { background: rgba(5, 191, 219, 0.2); color: var(--accent); }
        .status-detenido { background: rgba(255, 107, 107, 0.2); color: var(--danger); }
        .operation-detail { margin-bottom: 10px; display: flex; align-items: start; gap: 10px; }
        .detail-label { color: var(--text-muted); font-size: 0.8rem; min-width: 90px; }
        .detail-value { color: var(--text); font-weight: 500; font-size: 0.9rem; }
        .operation-footer { margin-top: 15px; padding-top: 15px; border-top: 1px solid var(--border); display: flex; gap: 10px; }
        .btn-small { padding: 8px 16px; font-size: 0.8rem; flex: 1; }
        .modal { display: none; position: fixed; top: 0; left: 0; right: 0; bottom: 0; background: rgba(13, 27, 42, 0.95); backdrop-filter: blur(8px); z-index: 1000; overflow-y: auto; padding: 40px 20px; }
        .modal.active { display: flex; align-items: center; justify-content: center; }
        .modal-content { background: var(--bg-card); border: 1px solid var(--border); border-radius: 16px; padding: 30px; max-width: 600px; width: 100%; box-shadow: 0 20px 60px rgba(0,0,0,0.5); }
        .modal-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 25px; }
        .modal-title { font-size: 1.5rem; font-weight: 700; color: var(--accent); }
        .close-modal { background: none; border: none; color: var(--text-muted); font-size: 1.8rem; cursor: pointer; padding: 0; width: 32px; height: 32px; display: flex; align-items: center; justify-content: center; border-radius: 8px; transition: all 0.3s ease; }
        .close-modal:hover { background: var(--bg-light); color: var(--text); }
        .form-group { margin-bottom: 20px; }
        .form-group label { display: block; margin-bottom: 8px; color: var(--text-muted); font-size: 0.9rem; font-weight: 500; }
        .form-group input, .form-group select { width: 100%; }
        .form-row { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; }
        .empty-state { text-align: center; padding: 60px 20px; color: var(--text-muted); }
        .empty-state-icon { font-size: 4rem; margin-bottom: 20px; opacity: 0.5; }
        @media (max-width: 768px) {
            .operations-grid { grid-template-columns: 1fr; }
            .toolbar { flex-direction: column; align-items: stretch; }
            .btn, input, select { width: 100%; }
            .form-row { grid-template-columns: 1fr; }
            h1 { font-size: 1.5rem; }
            .stats-grid { grid-template-columns: repeat(2, 1fr); }
        }
        .alert { background: rgba(255, 164, 27, 0.1); border: 1px solid var(--warning); border-radius: 8px; padding: 12px 16px; margin-top: 10px; font-size: 0.85rem; color: var(--warning); }
        #loadingOverlay { position: fixed; top: 0; left: 0; right: 0; bottom: 0; background: rgba(13, 27, 42, 0.95); display: flex; align-items: center; justify-content: center; z-index: 9999; font-size: 1.2rem; color: var(--accent); }

        /* ── MODAL RESUMEN PENDIENTES ── */
        #resumenModal { display: none; position: fixed; top: 0; left: 0; right: 0; bottom: 0; background: rgba(13,27,42,0.97); backdrop-filter: blur(10px); z-index: 2000; overflow-y: auto; padding: 30px 20px; }
        #resumenModal.active { display: flex; flex-direction: column; align-items: center; }
        #resumenModal .modal-actions { display: flex; gap: 12px; margin-bottom: 20px; flex-wrap: wrap; justify-content: center; }

        /* ── TARJETAS DE RESUMEN (lo que se captura) ── */
        #resumenCaptura { display: flex; flex-direction: column; gap: 18px; width: 100%; max-width: 560px; background: #f5f5f0; border-radius: 16px; padding: 28px 24px; }
        .resumen-header { text-align: center; margin-bottom: 8px; }
        .resumen-header .logo-text { font-family: 'Outfit', sans-serif; font-size: 1.35rem; font-weight: 700; color: #0a4d68; letter-spacing: -0.5px; }
        .resumen-header .resumen-meta { font-size: 0.78rem; color: #666; margin-top: 4px; font-family: 'JetBrains Mono', monospace; }
        .resumen-divider { border: none; border-top: 2px solid #d0d8e4; margin: 4px 0; }

        .cliente-bloque { background: #fff; border-radius: 10px; border: 1px solid #dde4ed; overflow: hidden; box-shadow: 0 2px 8px rgba(0,0,0,0.06); }
        .cliente-nombre { background: #0a4d68; color: #fff; font-family: 'Outfit', sans-serif; font-size: 0.9rem; font-weight: 700; padding: 9px 14px; text-transform: uppercase; letter-spacing: 0.5px; }
        .cliente-tabla { width: 100%; border-collapse: collapse; font-family: 'Outfit', sans-serif; font-size: 0.8rem; }
        .cliente-tabla thead tr { background: #e8f4f8; }
        .cliente-tabla thead th { padding: 7px 10px; text-align: left; color: #0a4d68; font-weight: 700; font-size: 0.72rem; text-transform: uppercase; letter-spacing: 0.4px; border-bottom: 1px solid #d0dce8; }
        .cliente-tabla tbody tr:nth-child(even) { background: #f8fbfd; }
        .cliente-tabla tbody tr:last-child td { border-bottom: none; }
        .cliente-tabla tbody td { padding: 7px 10px; color: #2c3e50; border-bottom: 1px solid #edf2f7; vertical-align: middle; }
        .cliente-tabla tbody td.num { font-family: 'JetBrains Mono', monospace; font-size: 0.78rem; color: #0a4d68; font-weight: 600; }
        .cliente-tabla tbody td.vep { font-family: 'JetBrains Mono', monospace; font-weight: 700; color: #088395; text-align: right; }
        .cliente-tabla tfoot td { background: #e8f4f8; padding: 7px 10px; font-weight: 700; color: #0a4d68; font-size: 0.78rem; font-family: 'JetBrains Mono', monospace; text-align: right; border-top: 2px solid #c0d4e4; }
        .cliente-tabla tfoot td.label { text-align: left; font-family: 'Outfit', sans-serif; font-size: 0.75rem; text-transform: uppercase; letter-spacing: 0.3px; }

        .resumen-footer { text-align: center; margin-top: 4px; font-size: 0.68rem; color: #aaa; font-family: 'JetBrains Mono', monospace; }
    </style>
</head>
<body>
    <div id="loadingOverlay">🔄 Conectando...</div>

    <div class="container">
        <header>
            <div style="display: flex; justify-content: space-between; align-items: start; flex-wrap: wrap; gap: 20px;">
                <div>
                    <h1>🚢 Seguimiento Estudio Carracedo</h1>
                    <p class="subtitle">Gestión integral de despachos de aduana</p>
                </div>
                <div style="background: rgba(5, 191, 219, 0.1); border: 1px solid var(--accent); border-radius: 12px; padding: 15px 20px; min-width: 250px;">
                    <label style="display: block; color: var(--text-muted); font-size: 0.85rem; margin-bottom: 8px; font-weight: 500;">💵 Tipo de Cambio del Día (USD → ARS)</label>
                    <input type="number" id="exchangeRate" step="0.01" placeholder="Ej: 1050.50" style="width: 100%; padding: 10px 14px; font-size: 1.1rem; font-weight: 600; font-family: 'JetBrains Mono', monospace;" onchange="saveExchangeRate()">
                    <div id="exchangeRateDisplay" style="margin-top: 8px; color: var(--accent); font-size: 0.85rem; font-family: 'JetBrains Mono', monospace;"></div>
                </div>
            </div>
        </header>
        <div class="stats-grid" id="statsGrid"></div>
        <div class="toolbar">
            <button class="btn btn-primary" onclick="openNewOperationModal()">+ Nueva Operación</button>
            <input type="text" id="searchInput" placeholder="🔍 Buscar por carpeta, cliente, proveedor...">
            <select id="filterStatus">
                <option value="">Todos los estados</option>
                <option value="Pendiente">Pendiente</option>
                <option value="En curso">En curso</option>
                <option value="Detenido">Detenido</option>
                <option value="Completado">Completado</option>
            </select>
            <select id="filterClient"><option value="">Todos los clientes</option></select>
            <button class="btn btn-secondary" onclick="recalculateAllVepPesos()">🔄 Recalcular VEP</button>
            <button class="btn btn-secondary" onclick="generatePDFReport()" style="background: linear-gradient(135deg, #e74c3c, #c0392b); color: white; border: none;">📄 Generar Informe PDF</button>
            <button class="btn btn-secondary" onclick="openResumenModal()" style="background: linear-gradient(135deg, #1a6b3c, #27ae60); color: white; border: none;">📋 Resumen Pendientes</button>
        </div>
        <div class="operations-grid" id="operationsGrid"></div>
        <div class="toolbar" style="margin-top: 30px; justify-content: center;">
            <button class="btn btn-secondary" onclick="copyShareLink()">🔗 Copiar Link</button>
            <button class="btn btn-secondary" onclick="exportToExcel()">📊 Exportar Excel</button>
            <button class="btn btn-secondary" onclick="document.getElementById('importFile').click()">📥 Importar Excel</button>
            <input type="file" id="importFile" accept=".xlsx" style="display: none;" onchange="importFromExcel(event)">
        </div>
        <div style="text-align: center; padding: 20px; margin-top: 20px; color: var(--text-muted); font-size: 0.85rem;">
            Creado por Manuel Carracedo para Estudio Carracedo © 2025
        </div>
    </div>

    <!-- MODAL RESUMEN PENDIENTES -->
    <div id="resumenModal">
        <div class="modal-actions">
            <button class="btn btn-primary" onclick="descargarResumenImagen()">⬇️ Descargar Imagen</button>
            <button class="btn btn-secondary" onclick="copiarResumenImagen()">📋 Copiar Imagen</button>
            <button class="btn btn-secondary" onclick="closeResumenModal()" style="background:#c0392b;color:white;border:none;">✕ Cerrar</button>
        </div>
        <div id="resumenCaptura">
            <!-- Se genera dinámicamente -->
        </div>
    </div>

    <!-- MODAL OPERACION -->
    <div class="modal" id="operationModal">
        <div class="modal-content">
            <div class="modal-header">
                <h2 class="modal-title" id="modalTitle">Nueva Operación</h2>
                <button class="close-modal" onclick="closeModal()">×</button>
            </div>
            <form id="operationForm" onsubmit="saveOperation(event)">
                <div class="form-group"><label>Número de Carpeta *</label><input type="text" id="numeroCarpeta" required></div>
                <div class="form-row">
                    <div class="form-group">
                        <label>Tipo de Operación *</label>
                        <select id="tipoOperacion" required>
                            <option value="">Seleccionar...</option>
                            <option value="Importación">Importación</option>
                            <option value="Exportación">Exportación</option>
                            <option value="Zona Franca">Zona Franca</option>
                        </select>
                    </div>
                    <div class="form-group">
                        <label>Cliente *</label>
                        <input type="text" id="cliente" list="clientesList" required>
                        <datalist id="clientesList"></datalist>
                    </div>
                </div>
                <div class="form-group"><label>Proveedor</label><input type="text" id="proveedor"></div>
                <div class="form-row">
                    <div class="form-group"><label>Fecha Ingreso *</label><input type="date" id="fechaIngreso" required></div>
                    <div class="form-group">
                        <label>Estado ANMAT</label>
                        <select id="estadoAnmat">
                            <option value="">Seleccionar...</option>
                            <option value="Pendiente">Pendiente</option>
                            <option value="En revisión">En revisión</option>
                            <option value="PosAnmat">PosAnmat</option>
                            <option value="Aprobado">Aprobado</option>
                            <option value="Rechazado">Rechazado</option>
                        </select>
                    </div>
                </div>
                <div class="form-group"><label>Número ANMAT</label><input type="text" id="numeroAnmat" placeholder="Ej: 123456/24"></div>
                <div class="form-row">
                    <div class="form-group">
                        <label>Guía Original</label>
                        <select id="guiaOriginal">
                            <option value="">Seleccionar...</option>
                            <option value="Sí">Sí</option>
                            <option value="No">No</option>
                        </select>
                    </div>
                    <div class="form-group"><label>Valor en Ana (USD)</label><input type="number" id="valorAna" step="0.01"></div>
                </div>
                <div class="form-row">
                    <div class="form-group"><label>VEP (USD)</label><input type="number" id="vepUsd" step="0.01"></div>
                    <div class="form-group"><label>VEP (Pesos)</label><input type="number" id="vepPesos" step="0.01"></div>
                </div>
                <div class="form-group">
                    <label>Estado Operación *</label>
                    <select id="estadoOperacion" required>
                        <option value="Pendiente">Pendiente</option>
                        <option value="En curso">En curso</option>
                        <option value="Detenido">Detenido</option>
                        <option value="Completado">Completado</option>
                    </select>
                </div>
                <div class="form-row">
                    <div class="form-group"><label>Número de Despacho</label><input type="text" id="numeroDespacho"></div>
                    <div class="form-group"><label>Fecha Oficialización</label><input type="date" id="fechaOf"></div>
                </div>
                <div style="display: flex; gap: 15px; margin-top: 30px;">
                    <button type="submit" class="btn btn-primary" style="flex: 1;">Guardar</button>
                    <button type="button" class="btn btn-secondary" onclick="closeModal()" style="flex: 1;">Cancelar</button>
                </div>
            </form>
        </div>
    </div>

    <!-- html2canvas para captura de imagen -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>

    <script>
        const firebaseConfig = {
            apiKey: "AIzaSyCOWbNoM5fdUuIjAyFNtu_yjWiVmAMEdho",
            authDomain: "seguimiento-carracedo-3e837.firebaseapp.com",
            databaseURL: "https://seguimiento-carracedo-3e837-default-rtdb.firebaseio.com",
            projectId: "seguimiento-carracedo-3e837",
            storageBucket: "seguimiento-carracedo-3e837.firebasestorage.app",
            messagingSenderId: "2196327624",
            appId: "1:2196327624:web:796c6dd3e80ad89eb4e9fd"
        };

        let database, auth;
        try {
            firebase.initializeApp(firebaseConfig);
            database = firebase.database();
            auth = firebase.auth();
        } catch (error) { console.error('Error al conectar Firebase:', error); }

        let operations = [];
        let editingId = null;
        let exchangeRate = 0;
        const WORKSPACE_FIJO = 'ws_1771467728755_rdc9az';
        let workspaceId = WORKSPACE_FIJO;

        window.addEventListener('DOMContentLoaded', async () => {
            window.location.hash = WORKSPACE_FIJO;
            await new Promise((resolve, reject) => {
                auth.onAuthStateChanged(async (user) => {
                    if (user) { resolve(); }
                    else {
                        try { await auth.signInAnonymously(); }
                        catch (error) { reject(error); }
                    }
                });
            });
            await loadFromFirebase();
            await loadExchangeRate();
            renderStats();
            renderOperations();
            updateClientFilter();
            setupFilters();
            document.getElementById('fechaIngreso').valueAsDate = new Date();
            setupVepCalculation();
            listenToFirebaseChanges();
            document.getElementById('loadingOverlay').style.display = 'none';
        });

        async function loadFromFirebase() {
            if (!database) { loadFromStorage(); return; }
            try {
                const snapshot = await database.ref('workspaces/' + workspaceId + '/operations').once('value');
                if (snapshot.exists()) { operations = snapshot.val() || []; }
                else { loadFromStorage(); }
            } catch (error) { loadFromStorage(); }
        }

        async function saveToFirebase() {
            saveToStorage();
            if (!database) return;
            try { await database.ref('workspaces/' + workspaceId + '/operations').set(operations); }
            catch (error) { console.error('Error al guardar:', error); }
        }

        function listenToFirebaseChanges() {
            if (!database) return;
            database.ref('workspaces/' + workspaceId + '/operations').on('value', (snapshot) => {
                if (snapshot.exists()) {
                    const newOps = snapshot.val() || [];
                    if (JSON.stringify(newOps) !== JSON.stringify(operations)) {
                        operations = newOps;
                        renderStats(); renderOperations(); updateClientFilter();
                    }
                }
            });
        }

        async function saveExchangeRate() {
            exchangeRate = parseFloat(document.getElementById('exchangeRate').value) || 0;
            localStorage.setItem('exchangeRate_' + workspaceId, exchangeRate);
            if (database && exchangeRate > 0) {
                try { await database.ref('workspaces/' + workspaceId + '/exchangeRate').set(exchangeRate); }
                catch (error) { }
            }
            updateExchangeRateDisplay();
        }

        async function loadExchangeRate() {
            const stored = localStorage.getItem('exchangeRate_' + workspaceId);
            if (database) {
                try {
                    const snapshot = await database.ref('workspaces/' + workspaceId + '/exchangeRate').once('value');
                    if (snapshot.exists()) { exchangeRate = snapshot.val(); }
                    else if (stored) { exchangeRate = parseFloat(stored); }
                } catch (error) { if (stored) exchangeRate = parseFloat(stored); }
            } else if (stored) { exchangeRate = parseFloat(stored); }
            if (exchangeRate > 0) {
                document.getElementById('exchangeRate').value = exchangeRate;
                updateExchangeRateDisplay();
            }
        }

        function updateExchangeRateDisplay() {
            document.getElementById('exchangeRateDisplay').textContent = exchangeRate > 0 ? `1 USD = ${exchangeRate.toLocaleString('es-AR')} ARS` : '';
        }

        function setupVepCalculation() {
            document.getElementById('vepUsd').addEventListener('input', () => {
                if (exchangeRate > 0)
                    document.getElementById('vepPesos').value = ((parseFloat(document.getElementById('vepUsd').value) || 0) * exchangeRate).toFixed(2);
            });
        }

        function loadFromStorage() {
            const stored = localStorage.getItem('aduanaOperations_' + workspaceId);
            if (stored) operations = JSON.parse(stored);
        }

        function saveToStorage() {
            localStorage.setItem('aduanaOperations_' + workspaceId, JSON.stringify(operations));
        }

        function renderStats(filteredOps = null) {
            const ops = filteredOps || operations;
            const filterClient = document.getElementById('filterClient')?.value;
            document.getElementById('statsGrid').innerHTML = `
                <div class="stat-card"><div class="stat-value" style="color:var(--accent)">${ops.length}</div><div class="stat-label">Total Operaciones${filterClient ? ' - ' + filterClient : ''}</div></div>
                <div class="stat-card"><div class="stat-value" style="color:var(--warning)">${ops.filter(o=>o.estadoOperacion==='Pendiente').length}</div><div class="stat-label">Pendientes</div></div>
                <div class="stat-card"><div class="stat-value" style="color:var(--primary-light)">${ops.filter(o=>o.estadoOperacion==='En curso').length}</div><div class="stat-label">En Curso</div></div>
                <div class="stat-card"><div class="stat-value" style="color:var(--success)">${ops.filter(o=>o.estadoOperacion==='Completado').length}</div><div class="stat-label">Completados</div></div>
                <div class="stat-card"><div class="stat-value" style="color:var(--danger)">${ops.filter(o=>o.estadoOperacion==='Detenido').length}</div><div class="stat-label">Detenidos</div></div>
            `;
        }

        function renderOperations() {
            const searchTerm = document.getElementById('searchInput').value.toLowerCase();
            const filterStatus = document.getElementById('filterStatus').value;
            const filterClient = document.getElementById('filterClient').value;
            let filtered = operations.filter(op => {
                const matchSearch = !searchTerm || op.numeroCarpeta.toLowerCase().includes(searchTerm) || op.cliente.toLowerCase().includes(searchTerm) || (op.proveedor && op.proveedor.toLowerCase().includes(searchTerm));
                return matchSearch && (!filterStatus || op.estadoOperacion === filterStatus) && (!filterClient || op.cliente === filterClient);
            });
            renderStats(filtered);
            filtered.sort((a, b) => {
                const ac = a.estadoOperacion === 'Completado' ? 1 : 0, bc = b.estadoOperacion === 'Completado' ? 1 : 0;
                if (ac !== bc) return ac - bc;
                return b.numeroCarpeta.localeCompare(a.numeroCarpeta, undefined, { numeric: true, sensitivity: 'base' });
            });
            if (filtered.length === 0) {
                document.getElementById('operationsGrid').innerHTML = `<div class="empty-state"><div class="empty-state-icon">📦</div><h3>No hay operaciones</h3><p>Agrega tu primera operación para comenzar</p></div>`;
                return;
            }
            document.getElementById('operationsGrid').innerHTML = filtered.map(op => {
                const daysSince = Math.floor((new Date() - new Date(op.fechaIngreso)) / 86400000);
                const statusClass = op.estadoOperacion.toLowerCase().replace(' ', '-');
                return `
                    <div class="operation-card ${statusClass}">
                        <div class="operation-header">
                            <div class="operation-number">${op.numeroCarpeta}</div>
                            <div class="operation-status status-${statusClass}">${op.estadoOperacion}</div>
                        </div>
                        <div class="operation-detail"><span class="detail-label">Cliente:</span><span class="detail-value">${op.cliente}</span></div>
                        <div class="operation-detail"><span class="detail-label">Tipo:</span><span class="detail-value">${op.tipoOperacion}</span></div>
                        ${op.proveedor ? `<div class="operation-detail"><span class="detail-label">Proveedor:</span><span class="detail-value">${op.proveedor}</span></div>` : ''}
                        <div class="operation-detail"><span class="detail-label">Ingreso:</span><span class="detail-value">${formatDate(op.fechaIngreso)} (hace ${daysSince} días)</span></div>
                        ${op.estadoAnmat ? `<div class="operation-detail"><span class="detail-label">ANMAT:</span><span class="detail-value">${op.estadoAnmat}</span></div>` : ''}
                        ${op.numeroAnmat ? `<div class="operation-detail"><span class="detail-label">N° ANMAT:</span><span class="detail-value" style="font-family:'JetBrains Mono',monospace;color:var(--accent)">${op.numeroAnmat}</span></div>` : ''}
                        <div class="operation-detail"><span class="detail-label">VEP USD:</span><span class="detail-value" style="color:var(--success);font-weight:600">US$ ${(parseFloat(op.vepUsd)||0).toLocaleString('es-AR',{minimumFractionDigits:2,maximumFractionDigits:2})}</span></div>
                        <div class="operation-detail"><span class="detail-label">VEP ARS:</span><span class="detail-value" style="color:var(--accent);font-weight:600">$ ${(parseFloat(op.vepPesos)||0).toLocaleString('es-AR',{minimumFractionDigits:2,maximumFractionDigits:2})}</span></div>
                        ${op.numeroDespacho ? `<div class="operation-detail"><span class="detail-label">N° Despacho:</span><span class="detail-value">${op.numeroDespacho}</span></div>` : ''}
                        ${op.estadoOperacion === 'Pendiente' && daysSince > 15 ? '<div class="alert">⚠️ Operación demorada: más de 15 días</div>' : ''}
                        <div class="operation-footer">
                            <button class="btn btn-secondary btn-small" onclick="editOperation('${op.id}')">Editar</button>
                            <button class="btn btn-secondary btn-small" onclick="deleteOperation('${op.id}')">Eliminar</button>
                        </div>
                    </div>`;
            }).join('');
        }

        function formatDate(dateString) {
            return new Date(dateString + 'T00:00:00').toLocaleDateString('es-AR', { day: '2-digit', month: '2-digit', year: 'numeric' });
        }

        function openNewOperationModal() {
            editingId = null;
            document.getElementById('modalTitle').textContent = 'Nueva Operación';
            document.getElementById('operationForm').reset();
            document.getElementById('fechaIngreso').valueAsDate = new Date();
            document.getElementById('operationModal').classList.add('active');
            setupVepCalculation();
        }

        function editOperation(id) {
            editingId = id;
            const op = operations.find(o => o.id === id);
            if (!op) return;
            document.getElementById('modalTitle').textContent = 'Editar Operación';
            ['numeroCarpeta','tipoOperacion','cliente','proveedor','fechaIngreso','estadoAnmat','numeroAnmat','guiaOriginal','valorAna','vepUsd','vepPesos','estadoOperacion','numeroDespacho','fechaOf'].forEach(field => {
                document.getElementById(field).value = op[field] || '';
            });
            document.getElementById('operationModal').classList.add('active');
            setupVepCalculation();
        }

        function closeModal() { document.getElementById('operationModal').classList.remove('active'); }

        function saveOperation(event) {
            event.preventDefault();
            const fields = ['numeroCarpeta','tipoOperacion','cliente','proveedor','fechaIngreso','estadoAnmat','numeroAnmat','guiaOriginal','valorAna','vepUsd','vepPesos','estadoOperacion','numeroDespacho','fechaOf'];
            const formData = { id: editingId || Date.now().toString() };
            fields.forEach(f => formData[f] = document.getElementById(f).value);
            if (editingId) { operations[operations.findIndex(o => o.id === editingId)] = formData; }
            else { operations.push(formData); }
            saveToFirebase(); closeModal(); renderStats(); renderOperations(); updateClientFilter();
        }

        function deleteOperation(id) {
            if (confirm('¿Estás seguro de eliminar esta operación?')) {
                operations = operations.filter(o => o.id !== id);
                saveToFirebase(); renderStats(); renderOperations(); updateClientFilter();
            }
        }

        function recalculateAllVepPesos() {
            if (!exchangeRate || exchangeRate <= 0) { alert('Ingresá el Tipo de Cambio primero.'); document.getElementById('exchangeRate').focus(); return; }
            let updated = 0;
            operations.forEach(op => { if (parseFloat(op.vepUsd) > 0) { op.vepPesos = (parseFloat(op.vepUsd) * exchangeRate).toFixed(2); updated++; } });
            if (updated > 0) { saveToFirebase(); renderOperations(); alert(`✅ Se recalcularon ${updated} operaciones.`); }
            else { alert('No hay operaciones con VEP en USD.'); }
        }

        function copyShareLink() {
            const url = window.location.href;
            navigator.clipboard.writeText(url).then(() => alert('✅ Link copiado!\n\n' + url)).catch(() => prompt('Copiá este link:', url));
        }

        function updateClientFilter() {
            const clients = [...new Set(operations.map(o => o.cliente))].sort();
            document.getElementById('clientesList').innerHTML = clients.map(c => `<option value="${c}">`).join('');
            document.getElementById('filterClient').innerHTML = '<option value="">Todos los clientes</option>' + clients.map(c => `<option value="${c}">${c}</option>`).join('');
        }

        function setupFilters() {
            ['searchInput','filterStatus','filterClient'].forEach(id => {
                document.getElementById(id).addEventListener(id === 'searchInput' ? 'input' : 'change', renderOperations);
            });
        }

        function exportToExcel() {
            const wb = XLSX.utils.book_new();
            const data = operations.map(op => ({'Número de Carpeta':op.numeroCarpeta,'Tipo de Operación':op.tipoOperacion,'Cliente':op.cliente,'Proveedor':op.proveedor,'Fecha Ingreso':op.fechaIngreso,'Estado ANMAT':op.estadoAnmat,'Número ANMAT':op.numeroAnmat,'Guía Original':op.guiaOriginal,'Valor en Ana u$':op.valorAna,'Vep u$':op.vepUsd,'Vep Pesos':op.vepPesos,'Estado Operación':op.estadoOperacion,'N Despa':op.numeroDespacho,'Fecha Of':op.fechaOf}));
            XLSX.utils.book_append_sheet(wb, XLSX.utils.json_to_sheet(data), 'Seguimiento Operaciones');
            XLSX.writeFile(wb, `Seguimiento_Aduana_${new Date().toISOString().split('T')[0]}.xlsx`);
        }

        function importFromExcel(event) {
            const file = event.target.files[0];
            if (!file) return;
            const reader = new FileReader();
            reader.onload = function(e) {
                const wb = XLSX.read(new Uint8Array(e.target.result), { type: 'array' });
                const data = XLSX.utils.sheet_to_json(wb.Sheets[wb.SheetNames[0]]);
                operations = data.map((row, i) => ({
                    id: Date.now().toString() + i,
                    numeroCarpeta: row['Número de Carpeta'] || '', tipoOperacion: row['Tipo de Operación'] || 'Importación',
                    cliente: row['Cliente'] || '', proveedor: row['Proveedor'] || '',
                    fechaIngreso: row['Fecha Ingreso'] ? excelDateToJS(row['Fecha Ingreso']) : new Date().toISOString().split('T')[0],
                    estadoAnmat: row['Estado ANMAT'] || '', numeroAnmat: row['Número ANMAT'] || '',
                    guiaOriginal: row['Guía Original'] || '', valorAna: row['Valor en Ana u$'] || '',
                    vepUsd: row['Vep u$'] || '', vepPesos: row['Vep Pesos'] || '',
                    estadoOperacion: row['Estado Operación'] || 'Pendiente',
                    numeroDespacho: row['N Despa'] || '', fechaOf: row['Fecha Of'] ? excelDateToJS(row['Fecha Of']) : ''
                }));
                saveToFirebase(); renderStats(); renderOperations(); updateClientFilter();
                alert(`${operations.length} operaciones importadas correctamente`);
            };
            reader.readAsArrayBuffer(file);
        }

        function excelDateToJS(excelDate) {
            if (typeof excelDate === 'string') return excelDate;
            return new Date((excelDate - 25569) * 86400 * 1000).toISOString().split('T')[0];
        }

        // ─── RESUMEN PENDIENTES ───────────────────────────────────────────────────

        function openResumenModal() {
            // Filtrar operaciones pendientes (también incluye "En curso")
            const pendientes = operations.filter(op =>
                op.estadoOperacion === 'Pendiente' || op.estadoOperacion === 'En curso'
            );

            if (pendientes.length === 0) {
                alert('No hay operaciones pendientes o en curso.');
                return;
            }

            // Agrupar por cliente
            const porCliente = {};
            pendientes.forEach(op => {
                if (!porCliente[op.cliente]) porCliente[op.cliente] = [];
                porCliente[op.cliente].push(op);
            });

            const hoy = new Date().toLocaleDateString('es-AR', { day: '2-digit', month: '2-digit', year: 'numeric' });
            const tcText = exchangeRate > 0
                ? `TC: $${exchangeRate.toLocaleString('es-AR')} ARS/USD`
                : 'TC: no definido';

            let html = `
                <div class="resumen-header">
                    <div class="logo-text">🚢 Estudio Carracedo</div>
                    <div class="resumen-meta">${hoy} &nbsp;·&nbsp; ${tcText}</div>
                </div>
                <hr class="resumen-divider">
            `;

            Object.keys(porCliente).sort().forEach(cliente => {
                const ops = porCliente[cliente].sort((a, b) =>
                    a.numeroCarpeta.localeCompare(b.numeroCarpeta, undefined, { numeric: true })
                );
                const totalVepPesos = ops.reduce((sum, op) => sum + (parseFloat(op.vepPesos) || 0), 0);

                const filas = ops.map(op => `
                    <tr>
                        <td class="num">${op.numeroCarpeta}</td>
                        <td>${op.proveedor || '—'}</td>
                        <td class="vep">${(parseFloat(op.vepPesos) || 0).toLocaleString('es-AR', { minimumFractionDigits: 2, maximumFractionDigits: 2 })}</td>
                    </tr>
                `).join('');

                html += `
                    <div class="cliente-bloque">
                        <div class="cliente-nombre">${cliente}</div>
                        <table class="cliente-tabla">
                            <thead>
                                <tr>
                                    <th>N° Carpeta</th>
                                    <th>Proveedor</th>
                                    <th style="text-align:right">VEP $</th>
                                </tr>
                            </thead>
                            <tbody>${filas}</tbody>
                            ${ops.length > 1 ? `
                            <tfoot>
                                <tr>
                                    <td class="label" colspan="2">Total cliente</td>
                                    <td>${totalVepPesos.toLocaleString('es-AR', { minimumFractionDigits: 2, maximumFractionDigits: 2 })}</td>
                                </tr>
                            </tfoot>` : ''}
                        </table>
                    </div>
                `;
            });

            html += `<div class="resumen-footer">Generado por Sistema Seguimiento Carracedo</div>`;

            document.getElementById('resumenCaptura').innerHTML = html;
            document.getElementById('resumenModal').classList.add('active');
        }

        function closeResumenModal() {
            document.getElementById('resumenModal').classList.remove('active');
        }

        async function captureResumen() {
            const el = document.getElementById('resumenCaptura');
            return await html2canvas(el, {
                scale: 2.5,
                useCORS: true,
                backgroundColor: '#f5f5f0',
                logging: false
            });
        }

        async function descargarResumenImagen() {
            try {
                const canvas = await captureResumen();
                const link = document.createElement('a');
                link.download = `Resumen_Pendientes_${new Date().toISOString().split('T')[0]}.png`;
                link.href = canvas.toDataURL('image/png');
                link.click();
            } catch (e) {
                alert('Error al generar la imagen: ' + e.message);
            }
        }

        async function copiarResumenImagen() {
            try {
                const canvas = await captureResumen();
                canvas.toBlob(async (blob) => {
                    try {
                        await navigator.clipboard.write([
                            new ClipboardItem({ 'image/png': blob })
                        ]);
                        alert('✅ Imagen copiada al portapapeles. Podés pegarla directamente en WhatsApp o email.');
                    } catch {
                        alert('Tu navegador no soporta copiar imágenes directamente. Usá el botón Descargar.');
                    }
                });
            } catch (e) {
                alert('Error al generar la imagen: ' + e.message);
            }
        }

        // ─── PDF ──────────────────────────────────────────────────────────────────

        async function generatePDFReport() {
            if (operations.length === 0) { alert('No hay operaciones para generar el informe'); return; }
            const loadingMsg = document.createElement('div');
            loadingMsg.style.cssText = 'position:fixed;top:50%;left:50%;transform:translate(-50%,-50%);background:rgba(0,0,0,0.9);color:white;padding:30px 50px;border-radius:15px;z-index:10000;font-size:1.2rem;';
            loadingMsg.textContent = '📄 Generando informe PDF...';
            document.body.appendChild(loadingMsg);
            try {
                const clientStats = {};
                operations.forEach(op => {
                    if (!clientStats[op.cliente]) clientStats[op.cliente] = {total:0,pendiente:0,enCurso:0,detenido:0,completado:0,totalValorAna:0,totalVepUsd:0,totalVepPesos:0};
                    const s = clientStats[op.cliente]; s.total++;
                    if (op.estadoOperacion==='Pendiente') s.pendiente++;
                    else if (op.estadoOperacion==='En curso') s.enCurso++;
                    else if (op.estadoOperacion==='Detenido') s.detenido++;
                    else if (op.estadoOperacion==='Completado') s.completado++;
                    s.totalValorAna += parseFloat(op.valorAna)||0;
                    s.totalVepUsd += parseFloat(op.vepUsd)||0;
                    s.totalVepPesos += parseFloat(op.vepPesos)||0;
                });
                const canvas = document.createElement('canvas'); canvas.width=800; canvas.height=400; document.body.appendChild(canvas);
                const chart = new Chart(canvas.getContext('2d'), {
                    type:'bar', data:{labels:Object.keys(clientStats),datasets:[{label:'Total Operaciones',data:Object.keys(clientStats).map(c=>clientStats[c].total),backgroundColor:'rgba(5,191,219,0.7)',borderColor:'rgba(5,191,219,1)',borderWidth:2}]},
                    options:{responsive:false,plugins:{title:{display:true,text:'Operaciones por Cliente',font:{size:18,weight:'bold'},color:'#0a4d68'},legend:{display:true,position:'top'}},scales:{y:{beginAtZero:true,ticks:{stepSize:1}}}}
                });
                await new Promise(r => setTimeout(r, 500));
                const chartImage = canvas.toDataURL('image/png');
                document.body.removeChild(canvas); chart.destroy();
                const {jsPDF} = window.jspdf;
                const doc = new jsPDF('p','mm','a4');
                const pw = doc.internal.pageSize.getWidth(), ph = doc.internal.pageSize.getHeight();
                let y = 20;
                doc.setFontSize(22); doc.setTextColor(10,77,104);
                doc.text('Informe de Seguimiento - Estudio Carracedo', pw/2, y, {align:'center'}); y+=10;
                doc.setFontSize(12); doc.setTextColor(100,100,100);
                doc.text('Fecha: '+new Date().toLocaleDateString('es-AR',{year:'numeric',month:'long',day:'numeric'}), pw/2, y, {align:'center'}); y+=15;
                doc.setFontSize(16); doc.setTextColor(10,77,104); doc.text('Resumen General',15,y); y+=10;
                doc.setFontSize(11); doc.setTextColor(0,0,0);
                doc.text('Total: '+operations.length,20,y); y+=7;
                doc.text('Pendientes: '+operations.filter(o=>o.estadoOperacion==='Pendiente').length,20,y); y+=7;
                doc.text('En Curso: '+operations.filter(o=>o.estadoOperacion==='En curso').length,20,y); y+=7;
                doc.text('Detenidos: '+operations.filter(o=>o.estadoOperacion==='Detenido').length,20,y); y+=7;
                doc.text('Completados: '+operations.filter(o=>o.estadoOperacion==='Completado').length,20,y); y+=15;
                doc.addImage(chartImage,'PNG',15,y,180,90);
                doc.addPage(); y=20;
                doc.setFontSize(16); doc.setTextColor(10,77,104); doc.text('Detalle por Cliente',15,y); y+=10;
                Object.keys(clientStats).sort().forEach(cliente => {
                    const s = clientStats[cliente];
                    if (y>ph-50) {doc.addPage(); y=20;}
                    doc.setFontSize(12); doc.setTextColor(8,131,149); doc.text(cliente,15,y); y+=7;
                    doc.setFontSize(10); doc.setTextColor(60,60,60);
                    doc.text('  Total: '+s.total,20,y); y+=6;
                    doc.text('  P:'+s.pendiente+' | EC:'+s.enCurso+' | D:'+s.detenido+' | C:'+s.completado,20,y); y+=6;
                    if(s.totalValorAna>0){doc.text('  ANA: $'+s.totalValorAna.toLocaleString('es-AR',{minimumFractionDigits:2}),20,y);y+=6;}
                    if(s.totalVepUsd>0){doc.text('  VEP USD: $'+s.totalVepUsd.toLocaleString('es-AR',{minimumFractionDigits:2}),20,y);y+=6;}
                    if(s.totalVepPesos>0){doc.text('  VEP ARS: $'+s.totalVepPesos.toLocaleString('es-AR',{minimumFractionDigits:2}),20,y);y+=6;}
                    y+=5;
                });
                doc.save('Informe_Seguimiento_'+new Date().toISOString().split('T')[0]+'.pdf');
                document.body.removeChild(loadingMsg);
                alert('Informe PDF generado exitosamente');
            } catch(error) {
                console.error('Error generando PDF:',error);
                if(document.body.contains(loadingMsg)) document.body.removeChild(loadingMsg);
                alert('Error al generar el PDF.');
            }
        }
    </script>
</body>
</html>
